<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEAKCART - Order Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 5px;
        }
        .shop-name {
            color: #d35400;
            font-weight: 800;
            font-size: 1.5em;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #444;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus, textarea:focus {
            border-color: #d35400;
            outline: none;
        }
        
        /* Product Section Styling */
        .product-section {
            background: #fff8f0;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #d35400;
            margin-bottom: 20px;
        }
        .product-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .product-row input {
            padding: 8px;
            font-size: 14px;
        }
        .btn-add {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .btn-remove {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-submit {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Order at <span class="shop-name">LEAKCART</span></h1>
    <p class="subtitle">अपना ऑर्डर यहाँ भेजें, हम आपको कॉल करेंगे।.</p>

    <!-- FORMSPREE ACTION URL -->
    <form action="https://formspree.io/f/xyknzlel" method="POST" id="orderForm">
        
        <!-- Customer Details -->
        <div class="form-group">
            <label>Customer Name (Naam):</label>
            <input type="text" name="name" placeholder="अपना नाम लिखें।" required>
        </div>
        <div class="form-group">
            <label>Mobile Number (Mobile):</label>
            <input type="tel" name="mobile" placeholder="10 digit number" required>
        </div>

        <!-- NEW ADDRESS FIELD ADDED HERE -->
        <div class="form-group">
            <label>Delivery Address (Pata):</label>
            <textarea name="address" rows="3" placeholder="Ghar ka pata yahan likhein..." required></textarea>
        </div>

        <!-- Product List Section -->
        <div class="product-section">
            <label>Product List (Samagri):</label>
            <div id="productList">
                <!-- Default 1 row -->
                <div class="product-row">
                    <input type="text" name="product_name[]" placeholder="Product Name" required>
                    <input type="number" name="product_qty[]" placeholder="Qty" style="width: 60px;" required>
                    <input type="text" name="product_unit[]" placeholder="Unit (kg/pc)" style="width: 80px;" required>
                    <button type="button" class="btn-remove" onclick="removeRow(this)">X</button>
                </div>
            </div>
            <button type="button" class="btn-add" onclick="addRow()">+ Add More Product</button>
        </div>

        <!-- Hidden Field for Clean Email -->
        <input type="hidden" name="order_details" id="order_details">

        <button type="submit" class="btn-submit">Submit Order</button>
    </form>
</div>

<script>
    // Row add karne ka function
    function addRow() {
        const container = document.getElementById('productList');
        const div = document.createElement('div');
        div.className = 'product-row';
        div.innerHTML = `
            <input type="text" name="product_name[]" placeholder="Product Name" required>
            <input type="number" name="product_qty[]" placeholder="Qty" style="width: 60px;" required>
            <input type="text" name="product_unit[]" placeholder="Unit (kg/pc)" style="width: 80px;" required>
            <button type="button" class="btn-remove" onclick="removeRow(this)">X</button>
        `;
        container.appendChild(div);
    }

    // Row hatane ka function
    function removeRow(btn) {
        btn.parentElement.remove();
    }

    // Form submit hone se pehle data clean karna
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        let details = "";
        const rows = document.querySelectorAll('.product-row');
        
        rows.forEach(row => {
            const name = row.querySelector('input[type="text"]').value;
            const qty = row.querySelector('input[name="product_qty[]"]').value;
            const unit = row.querySelector('input[name="product_unit[]"]').value;
            details += `- ${name}: ${qty} ${unit}\n`;
        });

        // Hidden field update karein
        document.getElementById('order_details').value = details;
    });
</script>

</body>
</html>
